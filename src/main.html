<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>GitHub API Front-end</title>
  <!-- Bootstrap CSS -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container py-5">
    <h1 class="mb-4 text-center">Consultar usuário do GitHub</h1>
    
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="input-group mb-3">
          <input id="username" type="text" class="form-control" placeholder="Digite o usuário do GitHub">
          <button id="buscar" class="btn btn-primary">Buscar</button>
        </div>
        
        <div id="resultado" class="card shadow-sm p-3 bg-white"></div>
        <!-- <pre id="json" class="bg-dark text-white p-3 mt-3 rounded"></pre> -->
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="index-api-github.js"></script>
</body>
</html>
